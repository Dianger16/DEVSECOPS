name: DevSecOps Pipeline — SAST + DAST

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  APP_PORT: 3000

jobs:

# ─────────────────────────────────────────────
# JOB 1: TEST + COVERAGE
# ─────────────────────────────────────────────
  test:
    name: Test + Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Run tests with coverage
        working-directory: app
        run: npm run test:ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app/coverage/
          retention-days: 1


# ─────────────────────────────────────────────
# JOB 2: SAST — SONARQUBE
# ─────────────────────────────────────────────
  sast:
    name: SAST — SonarQube
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Run tests (coverage)
        working-directory: app
        run: npm run test:ci

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: .
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.sources=app
            -Dsonar.tests=app
            -Dsonar.test.inclusions=**/*.test.js
            -Dsonar.javascript.lcov.reportPaths=app/coverage/lcov.info
            -Dsonar.exclusions=**/node_modules/**,**/coverage/**

      - name: Quality Gate Check
        uses: SonarSource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          scanMetadataReportFile: .scannerwork/report-task.txt


# ─────────────────────────────────────────────
# JOB 3: DAST — OWASP ZAP (FIXED)
# ─────────────────────────────────────────────
  dast:
    name: DAST — OWASP ZAP
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build and run app
        working-directory: app
        run: |
          docker build -t devsecops-app:latest .
          docker run -d \
            --name devsecops-app \
            -p 3000:3000 \
            devsecops-app:latest

          echo "Waiting for app..."
          for i in $(seq 1 20); do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 || echo "000")
            if [ "$HTTP" = "200" ]; then
              echo "App is ready"
              break
            fi
            sleep 3
          done

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://localhost:3000"
          cmd_options: "-a"
          fail_action: false
          allow_issue_writing: false
          # IMPORTANT: removed artifact_name to avoid conflicts

      - name: Debug ZAP outputs
        if: always()
        run: find . -name "*.html" -o -name "*.json" -o -name "*.md"

      - name: Upload ZAP reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap_scan_report
          path: |
            report_json.json
            report_md.md
            report_html.html
          retention-days: 30

      - name: Stop app container
        if: always()
        run: docker rm -f devsecops-app || true


# ─────────────────────────────────────────────
# JOB 4: DEPENDENCY AUDIT
# ─────────────────────────────────────────────
  dependency-audit:
    name: Dependency Vulnerability Audit
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Run npm audit
        working-directory: app
        run: |
          npm audit --audit-level=high || true
          npm audit --json > ../audit-report.json || true

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit-report
          path: audit-report.json
          retention-days: 30


# ─────────────────────────────────────────────
# JOB 5: SECURITY SUMMARY
# ─────────────────────────────────────────────
  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [sast, dast, dependency-audit]
    if: always()

    steps:
      - name: Print summary
        run: |
          echo "=============================="
          echo " DevSecOps Security Summary"
          echo "=============================="
          echo "SAST: ${{ needs.sast.result }}"
          echo "DAST: ${{ needs.dast.result }}"
          echo "Dependency: ${{ needs.dependency-audit.result }}"
          echo "=============================="

          if [ "${{ needs.sast.result }}" = "failure" ]; then
            echo "SAST FAILED"
            exit 1
          fi

          echo "Pipeline completed"