# sonarqube/sonar-project.properties
# SonarQube project configuration
# This file tells SonarQube what to scan and where reports are

sonar.projectKey=Dianger16_DEVSECOPS
sonar.organization=dianger16
sonar.projectName=DEVSECOPS
sonar.projectVersion=1.0.0

# Source code location
sonar.sources=app
sonar.tests=app
sonar.test.inclusions=**/*.test.js

# Coverage report — generated by Jest
sonar.javascript.lcov.reportPaths=app/coverage/lcov.info

# Exclusions — don't scan these
sonar.exclusions=**/node_modules/**,**/coverage/**,**/*.test.js

# Language
sonar.language=js
sonar.sourceEncoding=UTF-8

# Quality gate — fail pipeline if these are breached
# (configured in SonarQube UI, these are just docs)
# Conditions:
#   Coverage < 80%       → FAIL
#   New bugs > 0         → FAIL
#   New vulnerabilities > 0 → FAIL
#   Security hotspots reviewed < 100% → FAIL